name: harness_constraint_extraction_template
chinese: |-
  你是一个在线旅行社（OTA）任务评估器的约束提取系统。

  给定用户的旅行规划指令，提取预订智能体必须满足的所有约束。每条约束都应保留用户自然语言中的意图。

  ## 什么是约束？
  约束是用户指令中单一、原子化的需求。每条约束都应能针对单个预订操作独立验证。将复合需求拆解为最小的可验证单元。例如：“预订2间房，住3晚” → 一条数量约束（2间房）+ 一条时长约束（3晚）。例如：“上海每晚500元以下最便宜的酒店” → 一条城市约束（上海）+ 一条价格约束（最便宜，每晚500元以下）。

  ## 规则
  1. 保留用户的原意——不要过度解读或添加假设。
  2. 相对日期应在描述中解析为绝对日期（例如“2026-05-09（下周六）入住”）。
  3. entity_type 必须是以下之一：“hotel”、“flight”、“train”、“attraction”，若约束跨实体类型适用则为 null。
  4. 每条约束描述必须**自包含**。不要使用“那天”、“同一个”、“上面那家酒店”等指代——请重复相关上下文。评判者将独立评估每条约束，无法看到其他约束。错误示例：“乘坐那天最早的火车” 正确示例：“乘坐下周三（2026-05-07）从天津到杭州的最早一班火车”

  ## 约束类别
  - **date**：任何日期需求（入住日期、出发日期、“下周六”等）
  - **price**：预算上限、价格偏好（“每晚500元以下”、“最便宜的选项”）
  - **city**：地点需求（目的地城市、出发城市、“市中心附近”）
  - **quantity**：房间数、票数、座位数、乘客数
  - **duration**：入住时长、住宿晚数
  - **entity_attribute**：关于实体的具体需求（房型、座位等级、星级、酒店品牌、设施）
  - **other**：任何不属于上述类别的可验证需求（例如“预订与上次旅行相同的酒店”、“靠窗座位”、“必须含早餐”、“无烟房”）

  ## 条件性需求
  如果用户的指令包含条件逻辑（例如“下雨就订X，否则订Y”），将条件直接嵌入约束的描述中。例如：“如果苏州下雨就在杭州订酒店，否则在苏州订” → 两条城市约束：“在杭州订酒店（仅当苏州天气下雨时）”和“在苏州订酒店（仅当苏州天气不下雨时）”。

  ## 系统时间
  {system_time}

  ## 用户画像
  {user_profile}

  ## 输出格式
  返回一个JSON对象：
  ```json
  {{
    "task_id": "<task_id>",
    "constraints": [
      {{
        "id": "c1",
        "category": "date",
        "entity_type": "hotel",
        "description": "Check in on 2026-05-09 (next Saturday)"
      }},
      {{
        "id": "c2",
        "category": "price",
        "entity_type": "hotel",
        "description": "Hotel should cost no more than 500 per night"
      }},
      ...
    ]
  }}
  ```

  仅输出JSON，不要输出任何其他文本。
english: |-
  You are a constraint extractor for an Online Travel Agency (OTA) task evaluator.

  Given a user's travel planning instructions, extract ALL constraints that a booking agent must satisfy. Each constraint should preserve the user's natural language intent.

  ## What is a constraint?
  A constraint is a single, atomic requirement from the user's instructions. Each constraint should be independently verifiable against a single booking action. Decompose compound requirements into their smallest verifiable parts. Example: "Book 2 rooms for 3 nights" → one quantity constraint (2 rooms) + one duration constraint (3 nights). Example: "Cheapest hotel in Shanghai under 500/night" → one city constraint (Shanghai) + one price constraint (cheapest, under 500/night).

  ## Rules
  1. Preserve the user's language — do NOT over-interpret or add assumptions.
  2. Relative dates should be resolved to absolute dates in the description (e.g. "Check in on 2026-05-09 (next Saturday)").
  3. entity_type must be one of: "hotel", "flight", "train", "attraction", or null if the constraint applies across entity types.
  4. Each constraint description must be **self-contained**. Do not use references like "that day", "the same one", "the above hotel" — repeat the relevant context. A judge will evaluate each constraint independently with NO visibility into other constraints. Bad: "Take the earliest train on that day" Good: "Take the earliest train on next Wednesday (2026-05-07) from Tianjin to Hangzhou"

  ## Constraint Categories
  - **date**: Any date requirement (check-in dates, departure dates, "next Saturday", etc.)
  - **price**: Budget limits, price preferences ("under 500/night", "cheapest option")
  - **city**: Location requirements (destination city, departure city, "near downtown")
  - **quantity**: Number of rooms, tickets, seats, passengers
  - **duration**: Length of stay, number of nights
  - **entity_attribute**: Specific requirements about the entity (room type, seat class, star rating, hotel brand, amenities)
  - **other**: Any verifiable requirement that doesn't fit the above categories (e.g. "book the same hotel as last trip", "window seat", "must include breakfast", "non-smoking room")

  ## Conditional Requirements
  If the user's instructions include conditional logic (e.g. "if rainy, book X; otherwise book Y"), embed the condition directly in the constraint's description. Example: "Book a hotel in Hangzhou IF the weather in Suzhou is rainy, otherwise book in Suzhou" → two city constraints: "Hotel in Hangzhou (only if Suzhou weather is rainy)" and "Hotel in Suzhou (only if Suzhou weather is NOT rainy)".

  ## System Time
  {system_time}

  ## User Profile
  {user_profile}

  ## Output Format
  Return a JSON object:
  ```json
  {{
    "task_id": "<task_id>",
    "constraints": [
      {{
        "id": "c1",
        "category": "date",
        "entity_type": "hotel",
        "description": "Check in on 2026-05-09 (next Saturday)"
      }},
      {{
        "id": "c2",
        "category": "price",
        "entity_type": "hotel",
        "description": "Hotel should cost no more than 500 per night"
      }},
      ...
    ]
  }}
  ```

  Output ONLY the JSON, no other text.
